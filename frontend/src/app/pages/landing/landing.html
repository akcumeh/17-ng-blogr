<app-header [navGroups]="navGroups" [transparent]="isNavTransparent()" />

<main class="landing">
    <section class="hero">
        <div class="hero__content">
            <h1 class="hero__title">A modern publishing platform</h1>
            <p class="hero__subtitle">Grow your audience and build your online brand</p>
            <div class="hero__cta">
                <a routerLink="/signup">
                    <app-button variant="primary" size="lg">
                        Start for Free
                    </app-button>
                </a>
                <app-button variant="secondary" size="lg" (click)="scrollToFeatures()">
                    Learn More
                </app-button>
            </div>
        </div>
    </section>

    <app-features #featuresSection />
</main>

<app-footer [navGroups]="navGroups" />
