<footer class="footer">
    <div class="footer__container">
        <div class="footer__brand">
            <img src="assets/images/logo.svg" alt="Blogr" class="footer__logo" />
        </div>

        <nav class="footer__nav" aria-label="Footer navigation">
            @for (group of navGroups(); track group.label) {
                <div class="footer__column">
                    <h4 class="footer__heading">{{ group.label }}</h4>
                    <ul class="footer__list">
                        @for (item of group.items; track item.label) {
                            <li><a [href]="item.href" class="footer__link" [attr.target]="item.external ? '_blank' : null" [attr.rel]="item.external ? 'noopener noreferrer' : null">{{ item.label }}</a></li>
                        }
                    </ul>
                </div>
            }
        </nav>
    </div>
    <p class="footer__copyright">© Blogr. All rights reserved.</p>
</footer>
