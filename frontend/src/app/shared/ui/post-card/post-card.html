<article class="post-card" [class.post-card--featured]="featured()">
    <header class="post-card__meta">
        <svg class="post-card__clock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
        </svg>
        <span class="post-card__reading-time">{{ post().reading_time }} min read</span>
    </header>

    <h2 class="post-card__title">
        <a [routerLink]="['/blogs', post()._id]" class="post-card__title-link">
            {{ post().title }}
        </a>
    </h2>

    <p class="post-card__excerpt">{{ post().description }}</p>

    <footer class="post-card__author">
        <div class="post-card__avatar" aria-hidden="true">
            {{ post().author.first_name.charAt(0) }}{{ post().author.last_name.charAt(0) }}
        </div>
        <div class="post-card__author-info">
            <span class="post-card__author-name">
                {{ post().author.first_name }} {{ post().author.last_name }}
            </span>
            <span class="post-card__date">{{ post().createdAt | date:'MMM dd, y' }}</span>
        </div>
        <a [routerLink]="['/blogs', post()._id]" class="post-card__arrow" aria-label="Read {{ post().title }}">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </a>
    </footer>
</article>
